<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pointeuse</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pointeuse">
<meta name="theme-color" content="#161D26">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161D26;--ink-2:#1F2935;--line:#2C3947;
    --paper:#F7F5F0;--paper-2:#FFFFFF;
    --text:#1C2530;--muted:#6A7686;--faint:#9AA5B1;
    --leave:#1F7A5E;--leave-soft:#E4F1EB;
    --over:#B5702A;--over-soft:#F6EBDC;
    --pos-d:#6FD3AC;--neg-d:#E6AE72;
    --radius:18px;--shadow:0 1px 2px rgba(10,18,28,.04),0 12px 30px rgba(10,18,28,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--text);font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;padding:22px 16px 60px;display:flex;justify-content:center}
  .wrap{width:100%;max-width:560px}

  .top{display:flex;align-items:center;justify-content:space-between;color:#C5CFDA;margin-bottom:14px;padding:0 4px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand b{font-family:"Fraunces",serif;font-weight:500;font-size:20px;color:#fff;letter-spacing:.2px}
  .brand span{font-size:12px;color:#7E8A98;letter-spacing:.06em;text-transform:uppercase}
  .weeknav{display:flex;align-items:center;gap:4px}
  .weeknav button{background:var(--ink-2);border:1px solid var(--line);color:#C5CFDA;width:30px;height:30px;border-radius:9px;font-size:15px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;transition:.15s}
  .weeknav button:hover{background:#28333F}
  .weeknav .lbl{font-size:12.5px;color:#9AA5B1;min-width:84px;text-align:center}
  .weeknav .today{font-size:11px;padding:0 10px;width:auto;color:var(--pos-d)}

  .balance{display:flex;align-items:center;justify-content:space-between;background:var(--ink-2);border:1px solid var(--line);border-radius:13px;padding:12px 16px;margin-bottom:14px;cursor:pointer;transition:.15s}
  .balance:hover{background:#28333F}
  .balance .l{font-size:11.5px;color:#9AA5B1;text-transform:uppercase;letter-spacing:.09em}
  .balance .l small{display:block;text-transform:none;letter-spacing:0;color:#6A7686;font-size:11px;margin-top:1px}
  .balance b{font-family:"Fraunces",serif;font-weight:500;font-size:26px;font-variant-numeric:tabular-nums}
  .balance b.pos{color:var(--pos-d)}.balance b.neg{color:var(--neg-d)}

  .hero{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 24px 20px;margin-bottom:14px;position:relative;overflow:hidden}
  .hero .eyebrow{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .hero .date{font-family:"Fraunces",serif;font-size:15px;color:#48535F;margin-top:2px}
  .leaverow{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:14px}
  .leaverow .lab{font-size:13px;color:var(--muted);margin-bottom:6px}
  .bigtime{font-family:"Fraunces",serif;font-weight:500;font-size:62px;line-height:.92;color:var(--leave);letter-spacing:-.01em;font-variant-numeric:tabular-nums}
  .bigtime.over{color:var(--over)}
  .quick{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .quick label{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}
  .quick input{font-family:"Fraunces",serif;font-size:22px;color:var(--text);border:none;background:transparent;text-align:right;width:96px;border-bottom:1.5px solid #DDD8CF;padding:2px 0;font-variant-numeric:tabular-nums}
  .quick input:focus{outline:none;border-color:var(--leave)}
  .timeline{margin-top:20px}
  .bar{height:10px;border-radius:6px;background:#EAE6DD;position:relative;overflow:hidden}
  .bar .fill{position:absolute;left:0;top:0;bottom:0;background:var(--leave);border-radius:6px;transition:width .4s ease}
  .bar .fill.over{background:var(--over)}
  .bar .now{position:absolute;top:-4px;bottom:-4px;width:2px;background:#1C2530;opacity:.55}
  .ticks{display:flex;justify-content:space-between;margin-top:7px;font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .ticks b{color:var(--text);font-weight:500}

  .card{background:var(--paper-2);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .card h2{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:16px 18px 8px}
  .head,.row{display:grid;grid-template-columns:38px 1fr 42px 54px 1fr;align-items:center;gap:7px;padding:8px 16px}
  .head{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);padding-bottom:4px;padding-top:0}
  .head span:nth-child(3),.head span:nth-child(4),.head span:nth-child(5){text-align:center}
  .row{border-top:1px solid #F0EEE9}
  .row.today{background:#F6FAF8}
  .row .day{font-weight:600;font-size:13px;color:var(--text)}
  .row .day small{display:block;font-weight:400;font-size:11px;color:var(--faint)}
  .row.today .day small{color:var(--leave)}
  .row input[type=time]{font-family:inherit;font-size:14px;border:1px solid #E6E3DC;border-radius:8px;padding:6px 6px;width:100%;background:#fff;color:var(--text);font-variant-numeric:tabular-nums}
  .row input[type=time]:focus{outline:none;border-color:var(--leave);box-shadow:0 0 0 2px var(--leave-soft)}
  .row .pause input{width:40px;text-align:center;font-size:13px;border:1px solid #E6E3DC;border-radius:8px;padding:6px 2px;font-family:inherit;color:var(--text)}
  .row .pause input:focus{outline:none;border-color:var(--leave)}
  .row .prev{text-align:center;font-size:14px;color:var(--leave);font-weight:500;font-variant-numeric:tabular-nums}
  .row .prev.empty{color:#CBD2DA}
  .realcell{display:flex;flex-direction:column;gap:2px}
  .ddelta{font-size:11px;font-variant-numeric:tabular-nums;text-align:center;font-weight:600;line-height:1}
  .ddelta.pos{color:var(--leave)}.ddelta.neg{color:var(--over)}

  .sum{display:flex;align-items:stretch;justify-content:space-between;gap:14px;padding:16px 18px;background:#FAF9F6;border-top:1px solid #EEEBE4}
  .sum .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:3px}
  .sum .val{font-family:"Fraunces",serif;font-size:23px;font-variant-numeric:tabular-nums;line-height:1}
  .sum .val small{font-size:12px;color:var(--faint);font-family:"Inter";font-weight:400;display:block;margin-top:3px}
  .sum .soldebox{text-align:right;border-left:1px solid #EAE6DD;padding-left:14px}
  .sum .sval{font-family:"Fraunces",serif;font-size:23px;font-variant-numeric:tabular-nums;line-height:1}
  .sum .sval.pos{color:var(--leave)}.sum .sval.neg{color:var(--over)}

  .actions{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn-primary{background:var(--leave);color:#fff}.btn-primary:hover{background:#1A6A52}
  .btn-ghost{background:var(--ink-2);color:#C5CFDA;border:1px solid var(--line)}.btn-ghost:hover{background:#28333F}

  details.panel{margin-top:12px;background:var(--ink-2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  details.panel summary{list-style:none;cursor:pointer;padding:13px 18px;font-size:13px;color:#C5CFDA;display:flex;align-items:center;gap:8px;font-weight:500}
  details.panel summary::-webkit-details-marker{display:none}
  details.panel[open] summary{border-bottom:1px solid var(--line)}
  .setgrid{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .setgrid .f{display:flex;flex-direction:column;gap:5px}
  .setgrid label{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em}
  .setgrid input{background:#141B23;border:1px solid var(--line);border-radius:9px;padding:9px 10px;color:#E8EDF2;font-family:inherit;font-size:14px;font-variant-numeric:tabular-nums}
  .setgrid input:focus{outline:none;border-color:var(--leave)}
  .sethint{grid-column:1/-1;font-size:12px;color:#7E8A98;line-height:1.5;margin-top:-2px}
  .sethint b{color:#C5CFDA;font-weight:500}

  .hist{padding:6px 0}
  .hrow{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;border-top:1px solid #232E3A;transition:.12s}
  .hrow:first-child{border-top:none}
  .hrow:hover{background:#232E3A}
  .hrow .hr-date{font-size:13px;color:#D5DCE3}
  .hrow .hr-date small{display:block;color:#7E8A98;font-size:11px;margin-top:1px}
  .hrow .hr-tot{font-size:13px;color:#9AA5B1;font-variant-numeric:tabular-nums}
  .hrow .hr-d{font-family:"Fraunces",serif;font-size:16px;font-variant-numeric:tabular-nums;min-width:62px;text-align:right}
  .hrow .hr-d.pos{color:var(--pos-d)}.hrow .hr-d.neg{color:var(--neg-d)}
  .hempty{padding:18px;color:#7E8A98;font-size:13px;text-align:center}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:11px 20px;border-radius:11px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:10}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .loading{text-align:center;color:#7E8A98;padding:40px;font-size:14px}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="loading">Chargement...</div></div>
<div class="toast" id="toast"></div>
<input type="file" id="imp" accept="application/json" style="display:none" onchange="importBackup(this.files[0])">

<script>
const STORE_SETTINGS="pointeuse:settings";
const DEFAULTS={weeklyTarget:2340,days:5,lunch:45,arrival:"08:15"};
const DAYNAMES=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"];

let settings={...DEFAULTS};
let week={};
let mondayOffset=0;

/* ---------- time helpers ---------- */
const pad=n=>String(n).padStart(2,"0");
function toMin(hhmm){if(!hhmm)return null;const[h,m]=hhmm.split(":").map(Number);return h*60+m;}
function toHHMM(min){min=((min%1440)+1440)%1440;return pad(Math.floor(min/60))+":"+pad(min%60);}
function fmtDur(min){if(min==null)return"\u2014";const s=min<0?"-":"";min=Math.abs(min);return s+Math.floor(min/60)+"h"+pad(Math.round(min%60));}
function fmtDelta(min){if(min==null)return"\u2014";if(Math.round(min)===0)return"0h00";const s=min>0?"+":"\u2212";min=Math.abs(min);return s+Math.floor(min/60)+"h"+pad(Math.round(min%60));}
function getMonday(off=0){const d=new Date();const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day+off*7);d.setHours(0,0,0,0);return d;}
function isoWeek(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-((t.getDay()+6)%7));const w1=new Date(t.getFullYear(),0,4);return{week:1+Math.round(((t-w1)/864e5-3+((w1.getDay()+6)%7))/7),year:t.getFullYear()};}
function isoWeekMonday(year,wk){const jan4=new Date(year,0,4);const day=(jan4.getDay()+6)%7;const w1=new Date(jan4);w1.setDate(jan4.getDate()-day);const m=new Date(w1);m.setDate(w1.getDate()+(wk-1)*7);m.setHours(0,0,0,0);return m;}
function weekKey(off){const m=getMonday(off);const{week,year}=isoWeek(m);return`pointeuse:week:${year}-W${pad(week)}`;}
function todayIndex(off){if(off!==0)return -1;return (new Date().getDay()+6)%7;}
function dailyTarget(){return Math.round(settings.weeklyTarget/settings.days);}

/* ---------- storage ---------- */
async function loadSettings(){try{const v=localStorage.getItem(STORE_SETTINGS);if(v)settings={...DEFAULTS,...JSON.parse(v)};}catch(e){settings={...DEFAULTS};}}
async function saveSettings(){try{localStorage.setItem(STORE_SETTINGS,JSON.stringify(settings));}catch(e){}}
async function loadWeek(){week={};try{const v=localStorage.getItem(weekKey(mondayOffset));if(v)week=JSON.parse(v);}catch(e){week={};}}
async function saveWeek(){try{localStorage.setItem(weekKey(mondayOffset),JSON.stringify(week));}catch(e){}}

/* ---------- computation ---------- */
function dayData(i){
  const d=week[i]||{};
  const arrival=d.arrival||"";
  const lunch=(d.lunch===0||d.lunch)?d.lunch:settings.lunch;
  const actual=d.actualDeparture||"";
  const aMin=toMin(arrival);
  const depMin=toMin(actual);
  let predicted=aMin!=null?aMin+dailyTarget()+Number(lunch):null;
  const settled=aMin!=null&&depMin!=null;
  const dailyDelta=settled?(depMin-aMin-Number(lunch))-dailyTarget():null;
  let worked=null;
  if(aMin!=null){
    if(depMin!=null)worked=depMin-aMin-Number(lunch);
    else if(i===todayIndex(mondayOffset)){
      const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();
      worked=Math.max(0,Math.min(nowMin,predicted)-aMin-Number(lunch));
    }
  }
  return{arrival,lunch:Number(lunch),actual,aMin,predicted,worked,settled,dailyDelta};
}
// pure aggregation over a raw week object (used for current week + history)
function computeWeekObj(w){
  let realized=0,delta=0,settledCount=0,projected=0,anyCount=0;
  const n=Math.max(settings.days,7);
  for(let i=0;i<n;i++){
    const d=w[i];if(!d)continue;
    const a=toMin(d.arrival);if(a==null)continue;
    anyCount++;
    const lunch=(d.lunch===0||d.lunch)?Number(d.lunch):settings.lunch;
    const dep=toMin(d.actualDeparture);
    if(dep!=null){const wk=dep-a-lunch;realized+=wk;projected+=wk;settledCount++;delta+=wk-dailyTarget();}
    else projected+=dailyTarget();
  }
  return{realized,settledDelta:delta,settledCount,projected,anyCount};
}
function cumulativeBalance(){
  let total=0;
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);if(!k||!k.startsWith("pointeuse:week:"))continue;
    try{total+=computeWeekObj(JSON.parse(localStorage.getItem(k))).settledDelta;}catch(e){}
  }
  return total;
}
function historyWeeks(){
  const arr=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);if(!k||!k.startsWith("pointeuse:week:"))continue;
    const m=k.match(/(\d{4})-W(\d{2})/);if(!m)continue;
    let w;try{w=JSON.parse(localStorage.getItem(k));}catch(e){continue;}
    const c=computeWeekObj(w);if(c.anyCount===0)continue;
    arr.push({year:+m[1],wk:+m[2],monday:isoWeekMonday(+m[1],+m[2]),...c});
  }
  arr.sort((a,b)=>b.monday-a.monday);
  return arr;
}

/* ---------- render ---------- */
function render(){
  const app=document.getElementById("app");
  const{week:wn}=isoWeek(getMonday(mondayOffset));
  const ti=todayIndex(mondayOffset);
  const heroIdx=ti>=0?ti:0;
  const hd=dayData(heroIdx);
  const heroDate=getMonday(mondayOffset);heroDate.setDate(heroDate.getDate()+heroIdx);
  const dateStr=heroDate.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});

  let fillPct=0,nowPct=null,over=false;
  if(hd.aMin!=null&&hd.predicted!=null){
    const span=hd.predicted-hd.aMin;
    if(ti===heroIdx){
      const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();
      nowPct=Math.max(0,Math.min(1,(nowMin-hd.aMin)/span))*100;
      fillPct=nowPct;over=nowMin>hd.predicted;if(over)fillPct=100;
    }else if(hd.actual){fillPct=100;}
  }
  const heroLeave=hd.predicted!=null?toHHMM(hd.predicted):"\u2013\u2013:\u2013\u2013";

  // rows
  let rows="";
  for(let i=0;i<settings.days;i++){
    const d=dayData(i);
    const dd=getMonday(mondayOffset);dd.setDate(dd.getDate()+i);
    const isToday=i===ti;
    rows+=`<div class="row${isToday?" today":""}">
      <div class="day">${DAYNAMES[i].slice(0,3)}<small>${dd.getDate()}/${pad(dd.getMonth()+1)}</small></div>
      <input type="time" value="${d.arrival}" oninput="setField(${i},'arrival',this.value)">
      <div class="pause"><input type="number" min="0" max="180" value="${d.lunch}" oninput="setField(${i},'lunch',this.value)"></div>
      <div class="prev ${d.predicted==null?'empty':''}">${d.predicted!=null?toHHMM(d.predicted):"\u2014"}</div>
      <div class="realcell">
        <input type="time" value="${d.actual}" oninput="setField(${i},'actualDeparture',this.value)">
        ${d.settled?`<div class="ddelta ${d.dailyDelta>=0?'pos':'neg'}">${fmtDelta(d.dailyDelta)}</div>`:``}
      </div>
    </div>`;
  }

  const cw=computeWeekObj(week);
  const showProj=cw.projected!==cw.realized;
  const wSolde=cw.settledCount>0?fmtDelta(cw.settledDelta):"\u2014";
  const wSoldeCls=cw.settledDelta>=0?"pos":"neg";

  const bal=cumulativeBalance();
  const balCls=bal>=0?"pos":"neg";

  // history
  const hist=historyWeeks();
  let histHTML=hist.length?`<div class="hist">`+hist.map(h=>{
    const end=new Date(h.monday);end.setDate(end.getDate()+settings.days-1);
    const rng=h.monday.toLocaleDateString("fr-FR",{day:"numeric",month:"short"})+" \u2013 "+end.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
    const dcls=h.settledDelta>=0?"pos":"neg";
    return `<div class="hrow" onclick="goToWeekKey(${h.year},${h.wk})">
      <div class="hr-date">Semaine ${h.wk}<small>${rng}</small></div>
      <div class="hr-tot">${fmtDur(h.realized)}</div>
      <div class="hr-d ${dcls}">${h.settledCount?fmtDelta(h.settledDelta):"\u2014"}</div>
    </div>`;
  }).join("")+`</div>`:`<div class="hempty">Aucune semaine enregistr\u00e9e pour l\u2019instant.</div>`;

  app.innerHTML=`
  <div class="top">
    <div class="brand"><b>Pointeuse</b><span>sem. ${wn}</span></div>
    <div class="weeknav">
      <button onclick="nav(-1)">\u2039</button>
      ${mondayOffset!==0?`<button class="today" onclick="goToday()">aujourd\u2019hui</button>`:`<span class="lbl">cette semaine</span>`}
      <button onclick="nav(1)">\u203A</button>
    </div>
  </div>

  <div class="balance" onclick="openHistory()">
    <div class="l">Solde cumul\u00e9<small>avance / retard, tous jours cl\u00f4tur\u00e9s</small></div>
    <b class="${balCls}">${fmtDelta(bal)}</b>
  </div>

  <div class="hero">
    <div class="eyebrow">${ti>=0?"Aujourd\u2019hui":"Aper\u00e7u \u2014 "+DAYNAMES[heroIdx]}</div>
    <div class="date">${dateStr}</div>
    <div class="leaverow">
      <div><div class="lab">D\u00e9part pr\u00e9vu</div><div class="bigtime ${over?'over':''}">${heroLeave}</div></div>
      <div class="quick"><label>Arriv\u00e9e</label><input type="time" value="${hd.arrival}" oninput="setField(${heroIdx},'arrival',this.value)"></div>
    </div>
    <div class="timeline">
      <div class="bar"><div class="fill ${over?'over':''}" style="width:${fillPct}%"></div>${nowPct!=null?`<div class="now" style="left:${nowPct}%"></div>`:""}</div>
      <div class="ticks">
        <span>${hd.aMin!=null?toHHMM(hd.aMin):"arriv\u00e9e"}</span>
        <span>pause ${hd.lunch} min \u00b7 fait <b>${fmtDur(hd.worked)}</b></span>
        <span>${heroLeave}</span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Semaine</h2>
    <div class="head"><span></span><span>Arriv\u00e9e</span><span>Pause</span><span>Pr\u00e9vu</span><span>R\u00e9el \u00b7 \u00e9cart</span></div>
    ${rows}
    <div class="sum">
      <div>
        <div class="lab">R\u00e9alis\u00e9 cette semaine</div>
        <div class="val">${fmtDur(cw.realized)}${showProj?`<small>projet\u00e9 ${fmtDur(cw.projected)}</small>`:``}</div>
      </div>
      <div class="soldebox">
        <div class="lab">Solde semaine</div>
        <div class="sval ${wSoldeCls}">${wSolde}</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="exportICS()">\u2913 Exporter vers Calendar</button>
    <button class="btn btn-ghost" onclick="clearWeek()">Effacer la semaine</button>
  </div>
  <div class="actions" style="margin-top:8px">
    <button class="btn btn-ghost" onclick="exportBackup()">\u2913 Sauvegarder</button>
    <button class="btn btn-ghost" onclick="document.getElementById('imp').click()">Restaurer</button>
  </div>

  <details class="panel" id="hist">
    <summary>\uD83D\uDCC5 Historique par semaine</summary>
    ${histHTML}
  </details>

  <details class="panel">
    <summary>\u2699 R\u00e9glages</summary>
    <div class="setgrid">
      <div class="f"><label>Objectif hebdo</label><input type="text" value="${fmtDur(settings.weeklyTarget)}" onchange="setTarget(this.value)"></div>
      <div class="f"><label>Jours / semaine</label><input type="number" min="1" max="7" value="${settings.days}" onchange="setDays(this.value)"></div>
      <div class="f"><label>Pause par d\u00e9faut (min)</label><input type="number" min="0" max="180" value="${settings.lunch}" onchange="setLunch(this.value)"></div>
      <div class="f"><label>Arriv\u00e9e par d\u00e9faut</label><input type="time" value="${settings.arrival}" onchange="setArr(this.value)"></div>
      <div class="sethint">Cible quotidienne : <b>${fmtDur(dailyTarget())}</b> de travail effectif. Le solde ne compte que les jours avec un <b>d\u00e9part r\u00e9el</b> \u2014 les cong\u00e9s restent neutres.</div>
    </div>
  </details>`;
}

/* ---------- events ---------- */
async function setField(i,k,v){if(!week[i])week[i]={};if(k==='lunch')v=v===""?0:Number(v);week[i][k]=v;await saveWeek();render();}
function nav(d){mondayOffset+=d;loadWeek().then(render);}
function goToday(){mondayOffset=0;loadWeek().then(render);}
function goToWeekKey(year,wk){const m=isoWeekMonday(year,wk);mondayOffset=Math.round((m-getMonday(0))/(7*86400000));loadWeek().then(()=>{render();window.scrollTo({top:0,behavior:"smooth"});});}
function openHistory(){const h=document.getElementById("hist");if(h){h.open=true;h.scrollIntoView({behavior:"smooth",block:"center"});}}
async function clearWeek(){if(!confirm("Effacer toutes les saisies de cette semaine ?"))return;week={};await saveWeek();render();toast("Semaine effac\u00e9e");}
function parseTarget(s){const m=s.match(/(\d+)\s*h\s*(\d+)?/i);if(m)return Number(m[1])*60+(m[2]?Number(m[2]):0);const n=Number(s);return isNaN(n)?settings.weeklyTarget:n*60;}
async function setTarget(v){settings.weeklyTarget=parseTarget(v);await saveSettings();render();}
async function setDays(v){settings.days=Math.max(1,Math.min(7,Number(v)||5));await saveSettings();render();}
async function setLunch(v){settings.lunch=Math.max(0,Number(v)||0);await saveSettings();render();}
async function setArr(v){settings.arrival=v||"08:15";await saveSettings();render();}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}

/* ---------- ICS ---------- */
function exportICS(){
  const monday=getMonday(mondayOffset);let ev="",count=0;
  for(let i=0;i<settings.days;i++){
    const d=dayData(i);if(d.aMin==null)continue;
    const dep=toMin(d.actual)!=null?toMin(d.actual):d.predicted;
    const date=new Date(monday);date.setDate(date.getDate()+i);
    const y=date.getFullYear(),mo=pad(date.getMonth()+1),da=pad(date.getDate());
    const st=`${y}${mo}${da}T${pad(Math.floor(d.aMin/60))}${pad(d.aMin%60)}00`;
    const en=`${y}${mo}${da}T${pad(Math.floor(dep/60))}${pad(dep%60)}00`;
    ev+=`BEGIN:VEVENT\r\nUID:${y}${mo}${da}-pointeuse@josuerocha.dev\r\nDTSTART:${st}\r\nDTEND:${en}\r\nSUMMARY:Travail\r\nDESCRIPTION:Pause ${d.lunch} min \u00b7 ${fmtDur(dep-d.aMin-d.lunch)} travaill\u00e9es\r\nEND:VEVENT\r\n`;count++;
  }
  if(!count){toast("Aucune arriv\u00e9e \u00e0 exporter");return;}
  const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Pointeuse//FR\r\nCALSCALE:GREGORIAN\r\n${ev}END:VCALENDAR\r\n`;
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));
  const{week:wn,year}=isoWeek(monday);a.download=`travail-${year}-S${pad(wn)}.ics`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);toast(`${count} journ\u00e9e(s) export\u00e9e(s)`);
}

/* ---------- backup ---------- */
function exportBackup(){
  const o={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("pointeuse:"))o[k]=localStorage.getItem(k);}
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(o,null,2)],{type:"application/json"}));
  a.download="pointeuse-sauvegarde-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);toast("Sauvegarde t\u00e9l\u00e9charg\u00e9e");
}
function importBackup(file){
  if(!file)return;const r=new FileReader();
  r.onload=async()=>{try{const o=JSON.parse(r.result);Object.keys(o).forEach(k=>{if(k.startsWith("pointeuse:"))localStorage.setItem(k,o[k]);});await loadSettings();await loadWeek();render();toast("Donn\u00e9es restaur\u00e9es");}catch(e){toast("Fichier invalide");}};
  r.readAsText(file);
}

/* ---------- service worker ---------- */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

/* ---------- init ---------- */
(async function(){await loadSettings();await loadWeek();render();})();
</script>
</body>
</html>
